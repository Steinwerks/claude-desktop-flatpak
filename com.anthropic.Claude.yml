app-id: com.anthropic.Claude
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: claude-desktop
separate-locales: false

finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Wayland access
  - --socket=wayland
  # Audio access
  - --socket=pulseaudio
  # Network access
  - --share=network
  # GPU acceleration
  - --device=dri
  # Home directory access for configuration
  - --filesystem=home
  # Access to .config for storing settings
  - --filesystem=xdg-config/claude:create
  # Session bus for desktop integration
  - --socket=session-bus
  # System bus for some desktop features
  - --system-talk-name=org.freedesktop.Notifications
  # Allow desktop notifications
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Allow file picker dialogs
  - --talk-name=org.freedesktop.portal.FileChooser

modules:
  - name: claude-desktop
    buildsystem: simple
    build-commands:
      # Create directory structure
      - mkdir -p /app/lib/claude-desktop
      - mkdir -p /app/bin
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      
      # Copy application files
      - cp -r app.asar /app/lib/claude-desktop/
      - cp -r app.asar.unpacked /app/lib/claude-desktop/ || true
      - cp -r resources /app/lib/claude-desktop/ || true
      
      # Install icons
      - install -Dm644 claude_6_256x256x32.png /app/share/icons/hicolor/256x256/apps/com.anthropic.Claude.png
      
      # Create launcher script
      - |
        cat > /app/bin/claude-desktop << 'EOF'
        #!/bin/sh
        export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
        exec zypak-wrapper /app/electron/electron /app/lib/claude-desktop/app.asar --ozone-platform-hint=auto "$@"
        EOF
      - chmod +x /app/bin/claude-desktop
      
      # Install desktop file
      - install -Dm644 com.anthropic.Claude.desktop /app/share/applications/com.anthropic.Claude.desktop
      
      # Install metainfo
      - install -Dm644 com.anthropic.Claude.metainfo.xml /app/share/metainfo/com.anthropic.Claude.metainfo.xml
    
    sources:
      - type: dir
        path: ../claude-desktop/build/electron-app
      - type: file
        path: ../claude-desktop/build/claude_6_256x256x32.png
      - type: file
        path: com.anthropic.Claude.desktop
      - type: file
        path: com.anthropic.Claude.metainfo.xml
